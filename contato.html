<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Contato - MF Tecidos</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-zinc-900 p-8 rounded-xl shadow-lg">
    <h1 class="text-3xl font-bold mb-6 text-center">
      Fale Conosco
    </h1>

    <form class="flex flex-col gap-4">
      <input
        type="text"
        placeholder="Nome"
        class="p-3 rounded bg-zinc-800 text-white outline-none focus:ring-2 focus:ring-white"
        required
      />

      <input
        type="text"
        placeholder="Sobrenome"
        class="p-3 rounded bg-zinc-800 text-white outline-none focus:ring-2 focus:ring-white"
        required
      />

      <input
        type="email"
        placeholder="Email"
        class="p-3 rounded bg-zinc-800 text-white outline-none focus:ring-2 focus:ring-white"
        required
      />

      <input
        type="tel"
        placeholder="WhatsApp"
        class="p-3 rounded bg-zinc-800 text-white outline-none focus:ring-2 focus:ring-white"
        required
      />

      <button
        type="submit"
        class="mt-4 bg-white text-black font-semibold py-3 rounded hover:bg-gray-200 transition"
        onclick="enviarFormulario(event)"
      >
        Enviar
      </button>
    </form>

    <p class="text-xs text-gray-400 mt-6 text-center">
      MF Tecidos • Atendimento personalizado
    </p>
  </div>

  <script>
    function enviarFormulario(event) {
      event.preventDefault();
      alert("Formulário enviado com sucesso! Entraremos em contato.");
    }
  </script>

</body>
</html>
