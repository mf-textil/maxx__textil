<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Contato | MF Tecidos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

  <div class="bg-zinc-900 p-8 rounded-xl w-full max-w-md shadow-lg">
    <h1 class="text-2xl font-bold mb-6 text-center">
      Entre em Contato
    </h1>

    <form class="space-y-4">
      <input
        type="text"
        placeholder="Nome"
        class="w-full px-4 py-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none"
      />

      <input
        type="text"
        placeholder="Sobrenome"
        class="w-full px-4 py-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none"
      />

      <input
        type="email"
        placeholder="Email"
        class="w-full px-4 py-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none"
      />

      <input
        type="tel"
        placeholder="Telefone / WhatsApp"
        class="w-full px-4 py-3 rounded bg-zinc-800 border border-zinc-700 focus:outline-none"
      />

      <button
        type="submit"
        class="w-full bg-green-600 hover:bg-green-700 transition py-3 rounded font-semibold"
      >
        Enviar
		
      </button>
    </form>
  </div>



</body>
</html>
