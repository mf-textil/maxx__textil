<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max Textil - Vestindo o Futuro</title>
    
    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                green: '#22c55e',
                dark: '#0a0a0a',
                gray: '#171717'
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    
    <style type="text/tailwindcss">
      @layer utilities {
        .text-shadow {
          text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-brand-dark text-white antialiased">
    <div id="root"></div>

    <script type="text/babel">

		
      const { useState, useEffect } = React;

      // --- Icons (Inline SVGs to avoid dependencies) ---
      const Icon = ({ children, className, size = 24, fill = "none" }) => (
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          width={size} 
          height={size} 
          viewBox="0 0 24 24" 
          fill={fill} 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={className}
        >
          {children}
        </svg>
      );
	 


      const Scissors = (props) => (
        <Icon {...props}>
          <circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" x2="8.12" y1="4" y2="15.88"/><line x1="14.47" x2="20" y1="14.48" y2="20"/><line x1="8.12" x2="12" y1="8.12" y2="12"/>
        </Icon>
      );
      const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
      const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
      const ChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
      const Layers = (props) => <Icon {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
      const Shirt = (props) => <Icon {...props}><path d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.47a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.47a2 2 0 0 0-1.34-2.23z"/></Icon>;
      const GraduationCap = (props) => <Icon {...props}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></Icon>;
      const Clock = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Icon>;
      const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
      const UserCheck = (props) => <Icon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></Icon>;
      const Instagram = (props) => <Icon {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></Icon>;
      const Facebook = (props) => <Icon {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></Icon>;
      const Linkedin = (props) => <Icon {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></Icon>;
      const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
      const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
      const Mail = (props) => <Icon {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Icon>;
      const MessageCircle = (props) => <Icon {...props}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></Icon>;

      // --- Header Component ---
      const Header = () => {
        const [isScrolled, setIsScrolled] = useState(false);
        const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

        useEffect(() => {
          const handleScroll = () => {
            setIsScrolled(window.scrollY > 50);
          };
          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        const navLinks = [
          { name: 'Início', href: '#inicio' },
          { name: 'Serviços', href: '#servicos' },
          { name: 'Diferenciais', href: '#diferenciais' },
          { name: 'Produtos', href: '#produtos' },
          { name: 'Contato', href: '#footer' },
        ];

        return (
          <header
            className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 ${
              isScrolled ? 'bg-black/90 backdrop-blur-md shadow-lg py-4' : 'bg-transparent py-6'
            }`}
          >

              {/* Logo */}
             <div className="flex items-center gap-3">
  <img
    src="./art/max textil.png"
    alt="Max Textil"
    className="h-40 w-auto object-contain"
  />
  <span className="sr-only">Max Textil</span>
</div>

              {/* Desktop Nav */}
              <nav className="hidden md:flex items-center gap-8">
                {navLinks.map((link) => (
                  <a
                    key={link.name}
                    href={link.href}
                    className="text-sm font-medium text-gray-300 hover:text-green-400 transition-colors uppercase tracking-wider"
                  >
                    {link.name}
                  </a>
                ))}
                <a
  href="https://wa.me/5581982455466"
  target="_blank"
  rel="noopener noreferrer"
  className="bg-green-600 hover:bg-green-700 text-white px-5 py-2 rounded-full font-semibold transition-transform hover:scale-105 shadow-lg shadow-green-900/20"
>
  WhatsApp
</a>

              </nav>

              {/* Mobile Menu Toggle */}
              <button
                className="md:hidden text-white focus:outline-none"
                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
              >
                {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}

            </div>

              <div className="md:hidden absolute top-full left-0 w-full bg-zinc-900 border-t border-zinc-800 shadow-xl py-6 px-6 flex flex-col gap-4">
                {navLinks.map((link) => (
                  <a
                    key={link.name}
                    href={link.href}
                    className="text-lg font-medium text-gray-200 hover:text-green-400"
                    onClick={() => setIsMobileMenuOpen(false)}
                  >
                    {link.name}
                  </a>
                ))}
                <a
                   href="https://wa.me/5581982455466"
                   onClick={() => setIsMobileMenuOpen(false)}
                   className="mt-2 text-center bg-green-600 text-white py-3 rounded-lg font-bold"
                >
                  Fale no WhatsApp
                </a>
              </div>
            )}
          </header>
        );
      };

      // --- Hero Component ---
      const Hero = () => {

/>

            </div>

            {/* Content */}

                Qualidade Premium

              <h1 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-white leading-tight mb-6 drop-shadow-lg text-shadow">
                Vestindo o Futuro com <br />

              <p className="text-lg md:text-xl text-gray-300 mb-10 max-w-2xl mx-auto leading-relaxed">
                A Max Textil oferece os melhores tecidos para confecção, unindo durabilidade,
                conforto e as últimas tendências do mercado.
              </p>
              <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                <a
                  href="#footer"
                  className="group bg-green-600 hover:bg-green-700 text-white text-lg px-8 py-4 rounded-full font-bold transition-all shadow-lg shadow-green-900/30 flex items-center gap-2"
                >
                  Orçamento Grátis
                  <ChevronRight className="w-5 h-5 group-hover:translate-x-1 transition-transform" />
                </a>
                <a
                  href="#servicos"
                  className="text-white hover:text-green-400 px-8 py-4 font-semibold transition-colors border-b border-transparent hover:border-green-400"
                >
                  Nossos Serviços
                </a>
              </div>
            </div>
          </section>
        );
      };

      // --- Services Component ---
      const ServiceCard = ({ icon, title, description }) => (

            <div className="text-green-500 group-hover:text-white transition-colors">

            </div>
          </div>
          <h3 className="text-2xl font-bold text-white mb-4">{title}</h3>
          <p className="text-gray-400 leading-relaxed">{description}</p>
        </div>
      );

      const Services = () => {
        return (
          <section id="servicos" className="py-24 bg-black">
            <div className="container mx-auto px-6">
              <div className="text-center mb-16">
                <h2 className="text-sm font-bold text-green-500 uppercase tracking-widest mb-2">O que oferecemos</h2>
                <h3 className="text-3xl md:text-4xl font-bold text-white">Nossas Especialidades</h3>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <ServiceCard
                  icon={<Layers size={32} />}
                  title="Venda de Tecidos"
                  description="Uma vasta seleção de cores da moda em lion sarja de alta performance para sua confecção."
                />
                <ServiceCard
                  icon={<Shirt size={32} />}
                  title="Vestuário"
                  description="Produção completa de peças masculinas e femininas com acabamento impecável e design moderno."
                />
                <ServiceCard
                  icon={<GraduationCap size={32} />}
                  title="Fardamento Escolar"
                  description="Uniformes duráveis e confortáveis para escolas e instituições, personalizados com a sua identidade."
                />
              </div>
            </div>
          </section>
        );
      };

      // --- Features Component ---
      const Features = () => {
        return (
          <section id="diferenciais" className="py-20 bg-zinc-900 border-y border-zinc-800">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                
                <div className="flex flex-col items-center">
                  <div className="mb-6 p-4 rounded-full bg-black border border-zinc-700 shadow-lg shadow-green-900/10">
                    <Clock className="w-10 h-10 text-green-500" />
                  </div>
                  <h4 className="text-xl font-bold text-white mb-2">Entrega no Prazo</h4>
                  <p className="text-gray-400 max-w-xs mx-auto">
                    Compromisso sério com horários. Sua produção não para por nossa causa.
                  </p>
                </div>

                <div className="flex flex-col items-center">
                  <div className="mb-6 p-4 rounded-full bg-black border border-zinc-700 shadow-lg shadow-green-900/10">
                    <Star className="w-10 h-10 text-green-500" />
                  </div>
                  <h4 className="text-xl font-bold text-white mb-2">Tecidos Premium</h4>
                  <p className="text-gray-400 max-w-xs mx-auto">
                    Matéria-prima rigorosamente selecionadas para garantir o melhor tecido e durabilidade.
                  </p>
                </div>

                <div className="flex flex-col items-center">
                  <div className="mb-6 p-4 rounded-full bg-black border border-zinc-700 shadow-lg shadow-green-900/10">
                    <UserCheck className="w-10 h-10 text-green-500" />
                  </div>
                  <h4 className="text-xl font-bold text-white mb-2">Especialista no segmento de moda</h4>
                  <p className="text-gray-400 max-w-xs mx-auto">
                    Foco e qualificação em tecelagem, vendas e tendências no ramo de moda/confecções e uniformes...
                  </p>
                </div>

              </div>
            </div>
          </section>
        );
      };

      // --- Gallery Component ---
      const Gallery = () => {
        const images = [
          { src: './art/short.png', title: 'Short Mauricinho' },
          { src: './art/bermuda.jpg', title: 'Bermuda' },
          { src: './art/camisa sarja.png', title: 'Camisa' },
          { src: './art/fit.png', title: 'Moda Fitnes' },
        ];

        return (
          <section id="galeria" className="py-24 bg-black">
            <div className="container mx-auto px-6">
              <div className="flex flex-col md:flex-row justify-between items-end mb-12">
                <div>
                   <h2 className="text-sm font-bold text-green-500 uppercase tracking-widest mb-2">Portfólio</h2>
                   <h3 className="text-3xl md:text-4xl font-bold text-white">Nossa Produção</h3>
                </div>
                <p className="text-gray-400 max-w-md mt-4 md:mt-0 text-right md:text-left">
                  Confira alguns dos modelos produzidos com nossos tecidos exclusivos.
                </p>
              </div>

               <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                {images.map((img, index) => (
                  <div key={index} className="group relative overflow-hidden rounded-xl aspect-[3/4]">
                    <img
                      src={img.src}
                      alt={img.title}
                      className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-6">
                      <span className="text-white font-bold text-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                        {img.title}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      // --- Footer Component ---
      const Footer = () => {
        return (
          <footer id="footer" className="bg-zinc-950 border-t border-zinc-900 pt-16 pb-8">
            <div className="container mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mb-12">
                
                {/* Brand */}
                <div className="col-span-1 md:col-span-1">
                  <h2 className="text-2xl font-bold text-white mb-4">
                    <img
    src="./art/max textil.png"
    alt="Max Textil"
    className="h-16 w-auto object-contain"
  />
                  </h2>
                  <p className="text-gray-500 text-sm leading-relaxed mb-6">
                    Sua parceira ideal em tecidos e confecção. Qualidade que veste gerações.
                  </p>
                  <div className="flex gap-4">
                    <a
  href="https://www.instagram.com/max_textil__/"
  target="_blank"
  rel="noopener noreferrer"
  className="text-gray-400 hover:text-green-500 transition-colors"
>
  <Instagram size={20} />
</a>
                    <a
  href="https://www.linkedin.com/in/max-textil-b8a8023a5/"
  target="_blank"
  rel="noopener noreferrer"
  className="text-gray-400 hover:text-green-500 transition-colors"
>
  <Linkedin size={20} />
</a>

                  </div>
                </div>

                {/* Links */}
                <div>
                  <h4 className="text-white font-semibold mb-6">Navegação</h4>
                  <ul className="space-y-3 text-sm text-gray-400">
                    <li><a href="#inicio" className="hover:text-green-500 transition-colors">Início</a></li>
                    <li><a href="#servicos" className="hover:text-green-500 transition-colors">Serviços</a></li>
                    <li><a href="#diferenciais" className="hover:text-green-500 transition-colors">Diferenciais</a></li>
                    <li><a href="#galeria" className="hover:text-green-500 transition-colors">produtos</a></li>
                  </ul>
                </div>

                {/* Contact */}
                <div>
                  <h4 className="text-white font-semibold mb-6">Contato</h4>
                  <ul className="space-y-4 text-sm text-gray-400">
                    <li className="flex items-start gap-3">
  <MapPin size={18} className="text-green-600 mt-0.5" />
  <a
    href="https://www.google.com/maps/search/?api=1&query=Av.+avenida dos estados,+329,+Caruaru,+PE"
    target="_blank"
    rel="noopener noreferrer"
    className="hover:text-green-500 transition-colors"
  >
    Av. Campina Grande, 329<br />Caruaru - PE
  </a>
</li>

                    <li className="flex items-center gap-3">
  <Mail size={18} className="text-green-600" />
  <a
    href="mailto:contato@maxtextil.com.br"
    className="hover:text-green-500 transition-colors"
  >
    contato@maxtextil.com.br
  </a>
</li>

                   <li className="flex items-center gap-3">
  <Phone size={18} className="text-green-600" />
  <a
    href="https://wa.me/5581982455466"
    target="_blank"
    rel="noopener noreferrer"
    className="hover:text-green-500 transition-colors font-medium"
  >
    (81) 98245-5466
  </a>
</li>


                  </ul>
                </div>

                 {/* Newsletter */}
                <div>
  <h4 className="text-white font-semibold mb-6">Novidades</h4>
  <p className="text-gray-500 text-sm mb-4">
    Receba ofertas exclusivas.
  </p>

 <form
  onSubmit={(e) => {
    e.preventDefault(); // impede submit padrão
    window.open("formulario.html", "_blank");
  }}
  className="flex gap-3"
>
  <input
    type="email"
    required
    placeholder="Digite seu email"
    className="bg-zinc-900 text-white px-4 py-2 rounded-l-lg focus:outline-none focus:ring-1 focus:ring-green-500 w-full text-sm border border-zinc-800"
  />

  <button
    type="submit"
    className="bg-green-600 hover:bg-green-700 px-6 py-2 rounded font-semibold"
  >
    OK
  </button>
</form>
</div>



              </div>

              <div className="border-t border-zinc-900 pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                <p className="text-gray-600 text-sm">
                  &copy; {new Date().getFullYear()} Max Textil. Todos os direitos reservados.
                </p>
                <p className="text-gray-700 text-xs">
                  Desenvolvido com tecnologia React & Tailwind.
                </p>
              </div>
            </div>
          </footer>
        );
      };

      // --- WhatsApp Button Component ---
      const WhatsAppButton = () => {
        return (
          <a
            href="https://wa.me/5581982455466"
            target="_blank"
            rel="noopener noreferrer"
            className="fixed bottom-6 right-6 z-50 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-lg hover:shadow-green-500/30 transition-all duration-300 hover:scale-110 flex items-center justify-center"
            aria-label="Fale conosco no WhatsApp"
          >
            <MessageCircle size={32} fill="white" className="text-transparent" />
          </a>
        );
      };

      <div className="overflow-hidden rounded-lg">
        <img
          src="./art/short.png"
          className="w-full h-128 object-cover transition-transform duration-300 hover:scale-110"

// --- Produtos Cores Component ---
const ProdutosCores = () => {

  // TODAS AS CORES JUNTAS
  const cores = [

  // FUNÇÃO DE LUMINÂNCIA (escuro → claro)
  const luminancia = (hex) => {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 0.299 * r + 0.587 * g + 0.114 * b;
  };

  const coresOrdenadas = [...cores].sort(
    (a, b) => luminancia(a[1]) - luminancia(b[1])
  );

  return (
    <section id="produtos" className="py-24 bg-black">
	{/* GALERIA DE PRODUTOS */}
<div className="mb-16">
  <GaleriaProdutos />
</div>

        </h2>

          {coresOrdenadas.map((cor, i) => (
            <div key={i} className="flex flex-col items-center">
             <div
  className="
    w-14
    h-24
    rounded-md
    border border-zinc-700
    cursor-pointer
    overflow-hidden
    transition-transform duration-300
    hover:scale-125
  "
>
  {cor[2] ? (
    <img
      src={cor[2]}
      alt={cor[0]}
      className="w-full h-full object-cover"
    />
  ) : (

      className="w-full h-full"
      style={{ backgroundColor: cor[1] }}
    ></div>
  )}
</div>


              <span className="text-gray-400 text-xs mt-2 text-center">
                {cor[0]}
              </span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

            <main className="flex-grow">

              <Services />

              <ProdutosCores />
            </main>

            <WhatsAppButton />

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
